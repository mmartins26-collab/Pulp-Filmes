<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>produtos | PulpFilm</title>
    <link rel="stylesheet" href="produtos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <span class="fonte-especial">PulpFilm</span>
                </h1>
                <nav class="nav">
                    <a href="reviews.html" target="_self" class="nav-link">REVIEWS</a>
                    <a href="noticias.html" target="_self" class="nav-link">NOTÍCIAS</a>
                    <a href="camisetas.html" class="nav-link">PRODUTOS</a>
                </nav>
                <div class="header-actions">
                    <button class="search-btn"><span class="material-symbols-outlined">search</span></button>
                    <a href="carrinho.html"  style="text-decoration: none;">
                        <button class="search-btn"><span class="material-symbols-outlined">shopping_cart</span></button>
                    </a>
                    <a href="login.html" style="text-decoration: none;">
                        <button class="login-btn">CRIAR UMA CONTA</button>
                    </a>
                    <a href="login.html" style="text-decoration: none;">
                        <button class="login-btn">ENTRAR</button>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container" style="max-width: 1000px; margin-top: 2rem;">
            <h2 class="fonte-três" style="color: #d4c117; font-size: 2rem; margin-bottom: 2rem; border-bottom: 1px solid #333; padding-bottom: 1rem;">SEU CARRINHO DE COMPRAS</h2>
            
            <div style="background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 2rem; overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid #333; font-family: 'PulpFiction3', sans-serif; color: #b3b3b3; font-size: 0.9rem;">
                            <th style="padding-bottom: 1rem;">PRODUTO</th>
                            <th style="padding-bottom: 1rem;">PREÇO</th>
                            <th style="padding-bottom: 1rem;">QUANTIDADE</th>
                            <th style="padding-bottom: 1rem; text-align: right;">SUBTOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody">
                    </tbody>
                </table>

                <div style="display: flex; flex-direction: column; align-items: flex-end; margin-top: 2.5rem; gap: 1.5rem;">
                    <div style="display: flex; gap: 3rem; font-size: 1.3rem; font-weight: bold;">
                        <span style="color: #e5e5e5;">TOTAL GERAL:</span>
                        <span id="cartTotalFinal" style="color: #d4c117;">R$ 0,00</span>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; width: 100%; justify-content: flex-end; flex-wrap: wrap;">
                        <a href="camisetas.html" style="text-decoration: none;">
                            <button class="filter-tab" style="border: 1px solid #333; padding: 1rem 2rem;">CONTINUAR COMPRANDO</button>
                        </a>
                        <button class="load-more-btn" style="padding: 1rem 3rem; border-radius: 6px; font-size: 1rem;">FINALIZAR PEDIDO</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="carrinho.js"></script>
</body>
</html>
